name: Check power-posing snapshot section layering

on:
  push:
    paths:
      - "pilots/living-knowledge-case/cases/power-posing/snapshots/**"
      - "pilots/living-knowledge-case/cases/power-posing/status-legend-v1.md"
      - "pilots/living-knowledge-case/cases/power-posing/verdict-grammar-v1.md"
      - "pilots/living-knowledge-case/cases/power-posing/snapshot-section-layering-v1.md"
      - "scripts/check_power_posing_snapshot_section_layering.py"
      - ".github/workflows/check-power-posing-snapshot-section-layering.yml"
  pull_request:
    paths:
      - "pilots/living-knowledge-case/cases/power-posing/snapshots/**"
      - "pilots/living-knowledge-case/cases/power-posing/status-legend-v1.md"
      - "pilots/living-knowledge-case/cases/power-posing/verdict-grammar-v1.md"
      - "pilots/living-knowledge-case/cases/power-posing/snapshot-section-layering-v1.md"
      - "scripts/check_power_posing_snapshot_section_layering.py"
      - ".github/workflows/check-power-posing-snapshot-section-layering.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-snapshot-section-layering:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run snapshot section layering check
        run: python scripts/check_power_posing_snapshot_section_layering.py
