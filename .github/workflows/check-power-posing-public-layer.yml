name: Check power-posing public layer

on:
  push:
    paths:
      - "pilots/living-knowledge-case/cases/power-posing/claims/**"
      - "pilots/living-knowledge-case/cases/power-posing/sources/**"
      - "pilots/living-knowledge-case/cases/power-posing/snapshots/**"
      - "pilots/living-knowledge-case/cases/power-posing/page/**"
      - "pilots/living-knowledge-case/cases/power-posing/status-legend-v1.md"
      - "pilots/living-knowledge-case/cases/power-posing/verdict-grammar-v1.md"
      - "pilots/living-knowledge-case/cases/power-posing/references-metadata-v1.md"
      - "pilots/living-knowledge-case/cases/power-posing/source-page-role-anchors-v1.md"
      - "pilots/living-knowledge-case/cases/power-posing/snapshot-subsection-semantic-anchors-v1.md"
      - "scripts/check_power_posing_*.py"
      - ".github/workflows/check-power-posing-public-layer.yml"
  pull_request:
    paths:
      - "pilots/living-knowledge-case/cases/power-posing/claims/**"
      - "pilots/living-knowledge-case/cases/power-posing/sources/**"
      - "pilots/living-knowledge-case/cases/power-posing/snapshots/**"
      - "pilots/living-knowledge-case/cases/power-posing/page/**"
      - "pilots/living-knowledge-case/cases/power-posing/status-legend-v1.md"
      - "pilots/living-knowledge-case/cases/power-posing/verdict-grammar-v1.md"
      - "pilots/living-knowledge-case/cases/power-posing/references-metadata-v1.md"
      - "pilots/living-knowledge-case/cases/power-posing/source-page-role-anchors-v1.md"
      - "pilots/living-knowledge-case/cases/power-posing/snapshot-subsection-semantic-anchors-v1.md"
      - "scripts/check_power_posing_*.py"
      - ".github/workflows/check-power-posing-public-layer.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-public-layer:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run public-layer orchestrator
        run: python scripts/check_power_posing_public_layer.py
