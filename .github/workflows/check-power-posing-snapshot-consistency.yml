name: Check power-posing snapshot consistency

on:
  push:
    paths:
      - "pilots/living-knowledge-case/cases/power-posing/**"
      - "scripts/check_power_posing_snapshot_consistency.py"
      - ".github/workflows/check-power-posing-snapshot-consistency.yml"
  pull_request:
    paths:
      - "pilots/living-knowledge-case/cases/power-posing/**"
      - "scripts/check_power_posing_snapshot_consistency.py"
      - ".github/workflows/check-power-posing-snapshot-consistency.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-snapshot-consistency:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run snapshot consistency check
        run: python scripts/check_power_posing_snapshot_consistency.py
