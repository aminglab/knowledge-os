name: Check power-posing verdict grammar

on:
  push:
    paths:
      - "pilots/living-knowledge-case/cases/power-posing/**"
      - "scripts/check_power_posing_verdict_grammar.py"
      - ".github/workflows/check-power-posing-verdict-grammar.yml"
  pull_request:
    paths:
      - "pilots/living-knowledge-case/cases/power-posing/**"
      - "scripts/check_power_posing_verdict_grammar.py"
      - ".github/workflows/check-power-posing-verdict-grammar.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-verdict-grammar:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run verdict grammar consistency check
        run: python scripts/check_power_posing_verdict_grammar.py
