name: check-cedv-canonical-schema

on:
  push:
    paths:
      - 'protocol/cedv/**'
      - 'scripts/check_cedv_canonical_schema.py'
      - '.github/workflows/check-cedv-canonical-schema.yml'
  pull_request:
    paths:
      - 'protocol/cedv/**'
      - 'scripts/check_cedv_canonical_schema.py'
      - '.github/workflows/check-cedv-canonical-schema.yml'

jobs:
  check-cedv-canonical-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run CEDV canonical schema checker
        run: python scripts/check_cedv_canonical_schema.py
