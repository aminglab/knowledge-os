name: Check power-posing public surface

on:
  push:
    paths:
      - "pilots/living-knowledge-case/cases/power-posing/**"
      - "scripts/check_power_posing_public_surface.py"
      - ".github/workflows/check-power-posing-public-surface.yml"
  pull_request:
    paths:
      - "pilots/living-knowledge-case/cases/power-posing/**"
      - "scripts/check_power_posing_public_surface.py"
      - ".github/workflows/check-power-posing-public-surface.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-public-surface:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run public surface consistency check
        run: python scripts/check_power_posing_public_surface.py
