name: check-cockpit4-a-public-candidate

on:
  push:
    paths:
      - 'cockpit/COCKPIT4-A/**'
      - 'scripts/check_cockpit4_a_public_candidate.py'
      - '.github/workflows/check-cockpit4-a-public-candidate.yml'
  pull_request:
    paths:
      - 'cockpit/COCKPIT4-A/**'
      - 'scripts/check_cockpit4_a_public_candidate.py'
      - '.github/workflows/check-cockpit4-a-public-candidate.yml'

jobs:
  check-cockpit4-a-public-candidate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run COCKPIT4-A public candidate checker
        run: python scripts/check_cockpit4_a_public_candidate.py
