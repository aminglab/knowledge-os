name: Check H. pylori snapshot consistency

on:
  push:
    paths:
      - "pilots/living-knowledge-case/cases/h-pylori-ulcer/snapshots/**"
      - "pilots/living-knowledge-case/cases/h-pylori-ulcer/references-metadata-v1.md"
      - "pilots/living-knowledge-case/cases/h-pylori-ulcer/snapshot-consistency-v1.md"
      - "scripts/check_h_pylori_snapshot_consistency.py"
      - ".github/workflows/check-h-pylori-snapshot-consistency.yml"
  pull_request:
    paths:
      - "pilots/living-knowledge-case/cases/h-pylori-ulcer/snapshots/**"
      - "pilots/living-knowledge-case/cases/h-pylori-ulcer/references-metadata-v1.md"
      - "pilots/living-knowledge-case/cases/h-pylori-ulcer/snapshot-consistency-v1.md"
      - "scripts/check_h_pylori_snapshot_consistency.py"
      - ".github/workflows/check-h-pylori-snapshot-consistency.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-snapshot-consistency:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run snapshot consistency check
        run: python scripts/check_h_pylori_snapshot_consistency.py
