name: check-cockpit2-b-a-result-surface

on:
  push:
    paths:
      - 'cockpit/COCKPIT2-B-A/**'
      - 'scripts/check_cockpit2_b_a_result_surface.py'
      - '.github/workflows/check-cockpit2-b-a-result-surface.yml'
  pull_request:
    paths:
      - 'cockpit/COCKPIT2-B-A/**'
      - 'scripts/check_cockpit2_b_a_result_surface.py'
      - '.github/workflows/check-cockpit2-b-a-result-surface.yml'

jobs:
  check-cockpit2-b-a-result-surface:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run COCKPIT2-B-A result-surface checker
        run: python scripts/check_cockpit2_b_a_result_surface.py
