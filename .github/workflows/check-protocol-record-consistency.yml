name: Check protocol record consistency

on:
  push:
    paths:
      - "pilots/living-knowledge-case/cases/power-posing/objects/**"
      - "protocol/object-envelope.md"
      - "protocol/link-types.md"
      - "object-relation-grammar-v1.md"
      - "verdict-grammar-v1.md"
      - "transition-admissibility-v1.md"
      - "record-consistency-check-floor-v1.md"
      - "scripts/check_protocol_record_consistency.py"
      - ".github/workflows/check-protocol-record-consistency.yml"
  pull_request:
    paths:
      - "pilots/living-knowledge-case/cases/power-posing/objects/**"
      - "protocol/object-envelope.md"
      - "protocol/link-types.md"
      - "object-relation-grammar-v1.md"
      - "verdict-grammar-v1.md"
      - "transition-admissibility-v1.md"
      - "record-consistency-check-floor-v1.md"
      - "scripts/check_protocol_record_consistency.py"
      - ".github/workflows/check-protocol-record-consistency.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-protocol-record-consistency:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run protocol record consistency check
        run: python scripts/check_protocol_record_consistency.py
