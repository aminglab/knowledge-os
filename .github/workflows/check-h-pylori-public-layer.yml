name: Check H. pylori public layer

on:
  push:
    paths:
      - "pilots/living-knowledge-case/cases/h-pylori-ulcer/claims/**"
      - "pilots/living-knowledge-case/cases/h-pylori-ulcer/sources/**"
      - "pilots/living-knowledge-case/cases/h-pylori-ulcer/snapshots/**"
      - "pilots/living-knowledge-case/cases/h-pylori-ulcer/public-layer-verification-atlas-v1.md"
      - "pilots/living-knowledge-case/cases/h-pylori-ulcer/public-layer-acceptance-pass-v1.md"
      - "pilots/living-knowledge-case/cases/h-pylori-ulcer/claim-page-pressure-coverage-v1.md"
      - "pilots/living-knowledge-case/cases/h-pylori-ulcer/source-page-role-anchors-v1.md"
      - "pilots/living-knowledge-case/cases/h-pylori-ulcer/snapshot-subsection-semantic-anchors-v1.md"
      - "scripts/check_h_pylori_claim_page_layering.py"
      - "scripts/check_h_pylori_claim_page_pressure_coverage.py"
      - "scripts/check_h_pylori_source_page_layering.py"
      - "scripts/check_h_pylori_source_page_role_anchors.py"
      - "scripts/check_h_pylori_snapshot_section_layering.py"
      - "scripts/check_h_pylori_snapshot_subsection_semantics.py"
      - "scripts/check_h_pylori_public_layer.py"
      - ".github/workflows/check-h-pylori-public-layer.yml"
  pull_request:
    paths:
      - "pilots/living-knowledge-case/cases/h-pylori-ulcer/claims/**"
      - "pilots/living-knowledge-case/cases/h-pylori-ulcer/sources/**"
      - "pilots/living-knowledge-case/cases/h-pylori-ulcer/snapshots/**"
      - "pilots/living-knowledge-case/cases/h-pylori-ulcer/public-layer-verification-atlas-v1.md"
      - "pilots/living-knowledge-case/cases/h-pylori-ulcer/public-layer-acceptance-pass-v1.md"
      - "pilots/living-knowledge-case/cases/h-pylori-ulcer/claim-page-pressure-coverage-v1.md"
      - "pilots/living-knowledge-case/cases/h-pylori-ulcer/source-page-role-anchors-v1.md"
      - "pilots/living-knowledge-case/cases/h-pylori-ulcer/snapshot-subsection-semantic-anchors-v1.md"
      - "scripts/check_h_pylori_claim_page_layering.py"
      - "scripts/check_h_pylori_claim_page_pressure_coverage.py"
      - "scripts/check_h_pylori_source_page_layering.py"
      - "scripts/check_h_pylori_source_page_role_anchors.py"
      - "scripts/check_h_pylori_snapshot_section_layering.py"
      - "scripts/check_h_pylori_snapshot_subsection_semantics.py"
      - "scripts/check_h_pylori_public_layer.py"
      - ".github/workflows/check-h-pylori-public-layer.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-public-layer:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run H. pylori public-layer suite
        run: python scripts/check_h_pylori_public_layer.py
